name: Rust workflow

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Workaround for GITHUB_TOKEN being read-only in dependabot PRs, stopping meow-coverage from working
    permissions:
      issues: write
      pull-requests: write
      contents: read
    uses: famedly/backend-build-workflows/.github/workflows/rust-workflow.yml@fcc2ec82a725d5c4c9c6a8f19e8df101c178dcb6
    secrets: inherit
